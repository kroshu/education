site_name: Robot operációs rendszerek és fejlesztői ökoszisztémák

nav:
  - Robot operációs rendszerek és fejlesztői ökoszisztémák: index.md
  - Gyakorlat:
    - seminar/index.md
    - "Robot vezérlése saját kontrollerrel": seminar/my-controller/index.md
    - "Robot mozgatása MoveIt segítségével": seminar/moveit-example/index.md

theme:
  name: material
  language: hu
  logo: img/kuka-logo.svg
  favicon: img/favicon.ico
  palette:
    - scheme: default
      primary: custom
      toggle:
        icon: material/brightness-7
        name: Váltás sötét módra
    - scheme: slate
      primary: custom
      toggle:
        icon: material/brightness-4
        name: Váltás világos módra

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

copyright: Copyright &copy; KUKA Hungária Kft.
